server {
    listen 80;
    server_name 15.135.109.255 localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /videos/ {
        proxy_pass http://backend:8000/videos/;
        proxy_set_header Host $host;
    }

    location /thumbnails/ {
        proxy_pass http://backend:8000/thumbnails/;
        proxy_set_header Host $host;
    }

    location /gallery/ {
        proxy_pass http://backend:8000/gallery/;
        proxy_set_header Host $host;
    }

    location /video/ {
        proxy_pass http://backend:8000/video/;
        proxy_set_header Host $host;
    }

    location /render/ {
        proxy_pass http://renderer:3100/render/;
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
