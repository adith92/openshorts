server {
    listen 80;
    listen [::]:80;

    server_name openshorts.app www.openshorts.app;

    root /opt/openshorts/dashboard/dist;
    index index.html;

    client_max_body_size 2048M;
    client_body_timeout 3600s;
    send_timeout 3600s;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location /videos/ {
        proxy_pass http://127.0.0.1:8000/videos/;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /thumbnails/ {
        proxy_pass http://127.0.0.1:8000/thumbnails/;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /gallery/ {
        proxy_pass http://127.0.0.1:8000/gallery/;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /video/ {
        proxy_pass http://127.0.0.1:8000/video/;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location = /render {
        proxy_pass http://127.0.0.1:3100/render;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /render/ {
        proxy_pass http://127.0.0.1:3100/render/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
