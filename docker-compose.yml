services:
  backend:
    build: .
    container_name: openshorts-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - ./output:/app/output
      - gemini-cli-data:/app/.gemini
    environment:
      - HOME=/app
      - GEMINI_FORCE_ENCRYPTED_FILE_STORAGE=true
      - NO_BROWSER=true
      - GEMINI_CLI_WORKING_DIR=/tmp/openshorts-gemini-cli
    restart: unless-stopped

  frontend:
    build: ./dashboard
    container_name: openshorts-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

  renderer:
    build:
      context: .
      dockerfile: render-service/Dockerfile
    container_name: openshorts-renderer
    ports:
      - "3100:3100"
    volumes:
      - ./output:/output
    environment:
      - REMOTION_BUNDLE_PATH=/app/remotion
      - OUTPUT_DIR=/output
      - PORT=3100
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  gemini-cli-data:
