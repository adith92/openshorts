name: Native AWS CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - cleanup/aws-native-codebase
      - feat/custom-endpoint-model-autofetch

permissions:
  contents: read

jobs:
  provider-tests:
    name: Custom endpoint tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install lightweight test dependencies
        run: python -m pip install --upgrade pip httpx
      - name: Validate native shell helpers
        run: |
          bash -n deploy/aws-native/custom-endpoint-check.sh
          bash -n deploy/aws-native/prepare-host-layout.sh
          bash -n scripts/clean-local-native.sh
      - name: Run custom endpoint and deployment tests
        run: |
          python -m unittest \
            tests/test_custom_ai_client.py \
            tests/test_custom_endpoint_check_script.py \
            tests/test_custom_endpoint_migration.py \
            tests/test_native_aws_deployment.py \
            -v

  frontend-build:
    name: Frontend production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install frontend dependencies
        run: npm --prefix dashboard ci
      - name: Build frontend
        run: npm --prefix dashboard run build

  renderer-build:
    name: Renderer TypeScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: render-service/package-lock.json
      - name: Install renderer service dependencies
        run: npm --prefix render-service ci
      - name: Install Remotion composition dependencies
        run: npm --prefix remotion ci --no-audit --no-fund
      - name: Build renderer
        run: npm --prefix render-service run build
